<!DOCTYPE html>
<html>
<head>
  <title>Email Verification</title>
</head>
<body>

<h2>Verifying your email...</h2>

<script src="https://cdn.jsdelivr.net/npm/appwrite@13.0.0"></script>
<script>
  const client = new Appwrite.Client();
  const account = new Appwrite.Account(client);

  client
    .setEndpoint("https://fra.cloud.appwrite.io/v1") // MUST SAME
    .setProject("YOUR_PROJECT_ID"); // <-- এখানে তোর Project ID দিবি

  const params = new URLSearchParams(window.location.search);
  const userId = params.get("userId");
  const secret = params.get("secret");

  if (userId && secret) {
    account.updateVerification(userId, secret)
      .then(() => {
        document.body.innerHTML = "<h2>✅ Email Verified Successfully!</h2>";
      })
      .catch(() => {
        document.body.innerHTML = "<h2>❌ Verification Failed</h2>";
      });
  } else {
    document.body.innerHTML = "<h2>❌ Invalid Link</h2>";
  }
</script>

</body>
</html>
